# 基于 Quantumult X 官方标准 Sample V1.1.0
#
# 以 ';' 或 '#' 或 '//' 开头的配置文件行为注释行
#
# 最后更新时间: 2026/5/21 10:51:00
#
# ================

# 建议在「其他设置」里「GeoLite2」的「来源」填写使用下面链接，并开启「自动更新」
; https://raw.githubusercontent.com/Loyalsoldier/geoip/release/Country.mmdb
; https://raw.githubusercontent.com/Hackl0us/GeoIP2-CN/release/Country.mmdb

# 利用描述文件屏蔽IOS更新提醒
; https://app.initnil.com/tvOS.mobileconfig

# 📌 一些通用的设置参数项
[general]
server_check_url = http://www.apple.com/generate_204
server_check_timeout = 2000
# > 资源解析器，各类远程资源的转换，如节点，规则，复写 等
resource_parser_url= https://fastly.jsdelivr.net/gh/KOP-XIAO/QuantumultX@master/Scripts/resource-parser.js
# > 服务器 GEO 节点信息展示
geo_location_checker=http://ip-api.com/json/?lang=zh-CN, https://raw.githubusercontent.com/I-am-R-E/Functional-Store-Hub/Master/GeoLocationChecker/QuantumultX/IP-API.js
# > 排除路由
excluded_routes= 10.0.0.0/8, 17.0.0.0/8, 24.105.30.129/32, 100.64.0.0/10, 172.16.0.0/12, 182.162.132.1/32, 185.60.112.157/32, 185.60.112.158/32,192.168.0.0/16,239.255.255.250/32
# > 根据网络自动切换 分流/直连/全局代理 等模式
#running_mode_trigger=filter, filter, wifi1:all_direct, wifi2:all_proxy
# > udp 服务策略
fallback_udp_policy = direct



# 📌 DNS设置
[dns]

# > 禁用系统 DNS 以及 ipv6
;no-system
;no-ipv6

# > 指定 dns 服务器，并发响应选取最优结果
;server=223.5.5.5
;server=114.114.114.114
;server=119.29.29.29
;server=8.8.8.8

# > HTTP/3 的 DoH
;prefer-doh3
# > DNS over HTTPS（加密DNS设置） (iOS 15.0以下doh-server数据为1，以上为2)
;doh-server = https://dns.alidns.com/dns-query
# > DNS over QUIC（加密DNS设置）
;doq-server = quic://dns.adguard.com

# 📌 策略组，不同策略组分流不同规则
[policy]
static=选择节点,proxy,HK,SG,TW,US,JP,img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Rocket.png
# static 策略组中，你需要手动选择想要的节点/策略组。
# available 策略组将按顺序选择你列表中第一个可用的节点。
# round-robin 策略组，将按列表的顺序轮流使用其中的节点。
# url-latency-benchmark 延迟策略组，选取延迟最优节点。
# dest-hash 策略组，随机负载均衡，但相同域名走固定节点。
# ssid 策略组，将根据你所设定的网络来自动切换节点/策略组

# > 静态策略组
static=Apple Service, direct, proxy, 选择节点, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Apple.png
static=国外网站, 选择节点, direct, proxy, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Area.png
static=国外影视, 选择节点, direct, proxy, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/HBO_Max.png
static=人工智能, 选择节点,HK,SG,TW,US,JP,proxy, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/ChatGPT.png
static=FINAL, 选择节点, direct, proxy, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Final.png

# > 动态策略组
# > alive-checking 设置为 true，即使该策略处于空闲状态，也会间隔时间，动基准测试
url-latency-benchmark=HK, server-tag-regex=香港|HK|Hong|🇭🇰, check-interval=1800, tolerance=0, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png
url-latency-benchmark=SG, server-tag-regex=新加坡|狮城|SG|Singapore|🇸🇬, check-interval=1800, tolerance=0, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png
url-latency-benchmark=TW, server-tag-regex=台湾|TW|Taiwan|Wan|🇨🇳|🇹🇼, check-interval=1800, tolerance=0, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Taiwan.png
url-latency-benchmark=US, server-tag-regex=美国|US|United States|America|🇺🇸, check-interval=1800, tolerance=0, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png
url-latency-benchmark=JP, server-tag-regex=日本|JP|Japan|🇯🇵, check-interval=1800, tolerance=0, alive-checking=false, img-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png

